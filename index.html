<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bloch Sphere</title>
<link rel="stylesheet" href="style.css" />
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Bloch Sphere</h1>
    </header>

    <div class="workspace" id="workspace">
      <div class="ws-col ws-left" id="ws-left">
      <section class="panel panel-palette">
        <h2 class="panel-title">Operations</h2>
        <div class="palette-grid" id="gate-palette"></div>
      </section>

      <div class="row-splitter" id="row-splitter-left"></div>

      <section class="panel panel-sphere">
        <div class="sphere-toolbar">
          <div class="qubit-tabs" id="qubit-tabs"></div>
          <button class="view-reset-btn" id="reset-view-btn" title="시점 초기화">⟲</button>
        </div>
        <div id="sphere-container"></div>
      </section>
      </div>

      <div class="col-splitter" id="col-splitter"></div>

      <div class="ws-col ws-right" id="ws-right">
      <section class="panel panel-circuit">
        <div class="circuit-toolbar">
          <h2 class="panel-title">Circuit</h2>
          <div class="qubit-stepper">
            <button class="stepper-btn" id="qubit-minus" title="큐비트 삭제">−</button>
            <span class="qubit-count" id="qubit-count">4</span>
            <button class="stepper-btn" id="qubit-plus" title="큐비트 추가">+</button>
          </div>
          <button class="icon-btn" id="clear-btn" title="전체 삭제">전체 삭제</button>
        </div>
        <div class="circuit-body">
          <div class="circuit-scroll">
            <div class="circuit-grid" id="circuit-grid"></div>
          </div>
          <div class="circuit-formula" id="state-formula"></div>
        </div>
        <div class="playback-controls">
          <button class="round-btn" id="reset-btn" title="처음으로">⏮</button>
          <button class="round-btn" id="step-back-btn" title="한 단계 뒤로">◀</button>
          <button class="round-btn round-btn-primary" id="play-btn" title="재생">▶</button>
          <button class="round-btn" id="step-fwd-btn" title="한 단계 앞으로">▶|</button>
          <span class="playback-status" id="playback-status">0 / 0 단계</span>
        </div>
      </section>

      <div class="row-splitter" id="row-splitter-right"></div>

      <section class="panel panel-probability">
        <h2 class="panel-title">Probabilities</h2>
        <div class="prob-chart" id="prob-list"></div>
      </section>
      </div>
    </div>
  </div>

  <div class="place-popover hidden" id="place-popover"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
