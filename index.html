<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bloch Sphere</title>
<link rel="stylesheet" href="style.css" />
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Bloch Sphere</h1>
      <a class="github-link" href="https://github.com/Seolwon64/quantumtools" target="_blank" rel="noopener" title="View on GitHub">
        <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>
        GitHub
      </a>
    </header>

    <div class="workspace" id="workspace">
      <div class="ws-col ws-left" id="ws-left">
      <section class="panel panel-palette">
        <h2 class="panel-title">Operations</h2>
        <div class="palette-grid" id="gate-palette"></div>
      </section>

      <div class="row-splitter" id="row-splitter-left"></div>

      <section class="panel panel-sphere">
        <div class="sphere-toolbar">
          <div class="qubit-tabs" id="qubit-tabs"></div>
          <button class="view-reset-btn" id="reset-view-btn" title="Reset view">⟲</button>
        </div>
        <div id="sphere-container"></div>
      </section>
      </div>

      <div class="col-splitter" id="col-splitter"></div>

      <div class="ws-col ws-right" id="ws-right">
      <section class="panel panel-circuit">
        <div class="circuit-toolbar">
          <h2 class="panel-title">Circuit</h2>
          <div class="qubit-stepper">
            <button class="stepper-btn" id="qubit-minus" title="Remove qubit">−</button>
            <span class="qubit-count" id="qubit-count">4</span>
            <button class="stepper-btn" id="qubit-plus" title="Add qubit">+</button>
          </div>
          <button class="icon-btn tool-icon-btn" id="share-btn" title="Copy share link">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.07 0l3-3a5 5 0 0 0-7.07-7.07l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7.07 0l-3 3a5 5 0 0 0 7.07 7.07l1.5-1.5"/></svg>
          </button>
          <button class="icon-btn tool-icon-btn" id="export-btn" title="Export to Qiskit / QASM">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          </button>
          <button class="icon-btn" id="clear-btn" title="Clear all">Clear all</button>
        </div>
        <div class="circuit-body">
          <div class="circuit-scroll">
            <div class="circuit-grid" id="circuit-grid"></div>
          </div>
          <div class="circuit-formula" id="state-formula"></div>
        </div>
        <div class="playback-controls">
          <button class="round-btn" id="reset-btn" title="To start">⏮</button>
          <button class="round-btn" id="step-back-btn" title="Step back">◀</button>
          <button class="round-btn round-btn-primary" id="play-btn" title="Play">▶</button>
          <button class="round-btn" id="step-fwd-btn" title="Step forward">▶|</button>
          <span class="playback-status" id="playback-status">0 / 0 steps</span>
        </div>
      </section>

      <div class="row-splitter" id="row-splitter-right"></div>

      <section class="panel panel-probability">
        <h2 class="panel-title">Probabilities</h2>
        <div class="prob-chart" id="prob-list"></div>
      </section>
      </div>
    </div>
  </div>

  <div class="place-popover hidden" id="place-popover"></div>

  <div class="export-menu hidden" id="export-menu">
    <button class="export-menu-item" id="export-qasm">Copy OpenQASM 2.0</button>
    <button class="export-menu-item" id="export-qiskit">Copy Qiskit (Python)</button>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
