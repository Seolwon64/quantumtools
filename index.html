<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quantum Tools</title>
<link rel="stylesheet" href="style.css" />
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <button class="menu-btn" id="menu-btn" title="Menu" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1>Quantum Tools</h1>
      <a class="github-link" href="https://github.com/Seolwon64/quantumtools" target="_blank" rel="noopener" title="View on GitHub">
        <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>
        GitHub
      </a>
    </header>

    <div class="menu-panel hidden" id="menu-panel">
      <p class="menu-panel-placeholder">More tools coming soon.</p>
    </div>

    <div class="workspace" id="workspace">
      <div class="ws-col ws-left" id="ws-left">
      <section class="panel panel-palette">
        <h2 class="panel-title">Operations</h2>
        <div class="palette-body" id="gate-palette"></div>
      </section>

      <div class="row-splitter" id="row-splitter-left"></div>

      <section class="panel panel-sphere">
        <div class="sphere-toolbar">
          <div class="qubit-tabs" id="qubit-tabs"></div>
          <span class="sphere-mode-title hidden" id="sphere-mode-title">Q-sphere</span>
          <button class="view-reset-btn" id="reset-view-btn" title="Reset view">⟲</button>
        </div>
        <div id="sphere-container"></div>
        <div class="sphere-caption hidden" id="sphere-caption">Maximally mixed — no local state information</div>

        <div class="sphere-footer">
          <div class="segmented view-toggle" id="view-toggle">
            <button class="segmented-btn active" data-view="bloch">Bloch</button>
            <button class="segmented-btn" data-view="qsphere">Q-sphere</button>
          </div>
          <div class="sphere-footer-right">
            <div class="qsphere-legend hidden" id="qsphere-legend">
              <div class="phase-wheel">
                <span class="phase-tick tick-right">0</span>
                <span class="phase-tick tick-top">π/2</span>
                <span class="phase-tick tick-left">π</span>
                <span class="phase-tick tick-bottom">3π/2</span>
              </div>
            </div>
            <div class="bloch-info" id="bloch-info">
              <span class="bloch-stat">Purity <b id="bloch-purity">1.00</b></span>
              <span class="bloch-stat bloch-mixed" title="Local mixedness = 1 − |r|. In multi-qubit systems |r|<1 is not caused by entanglement alone.">
                <span class="bloch-mixed-label">Mixedness</span>
                <span class="bloch-mixed-bar"><span class="bloch-mixed-fill" id="bloch-mixed-fill"></span></span>
                <b id="bloch-mixed-pct">0%</b>
              </span>
            </div>
          </div>
        </div>
      </section>
      </div>

      <div class="col-splitter" id="col-splitter"></div>

      <div class="ws-col ws-right" id="ws-right">
      <section class="panel panel-circuit">
        <div class="circuit-toolbar">
          <h2 class="panel-title">Circuit</h2>
          <div class="qubit-stepper">
            <button class="stepper-btn" id="qubit-minus" title="Remove qubit">−</button>
            <span class="qubit-count" id="qubit-count">4</span>
            <button class="stepper-btn" id="qubit-plus" title="Add qubit">+</button>
          </div>
          <button class="icon-btn tool-icon-btn" id="undo-btn" title="Undo (Ctrl+Z)">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
          </button>
          <button class="icon-btn tool-icon-btn" id="redo-btn" title="Redo (Ctrl+Shift+Z)">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/></svg>
          </button>
          <button class="icon-btn tool-icon-btn" id="share-btn" title="Copy share link">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.07 0l3-3a5 5 0 0 0-7.07-7.07l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7.07 0l-3 3a5 5 0 0 0 7.07 7.07l1.5-1.5"/></svg>
          </button>
          <button class="icon-btn tool-icon-btn" id="export-btn" title="Export to Qiskit / QASM">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          </button>
          <button class="icon-btn" id="clear-btn" title="Clear all">Clear all</button>
        </div>
        <div class="circuit-body">
          <div class="circuit-scroll">
            <div class="circuit-grid" id="circuit-grid"></div>
          </div>
          <div class="circuit-formula" id="state-formula"></div>
        </div>
        <div class="playback-controls">
          <button class="round-btn" id="reset-btn" title="To start">⏮</button>
          <button class="round-btn" id="step-back-btn" title="Step back">◀</button>
          <button class="round-btn round-btn-primary" id="play-btn" title="Play">▶</button>
          <button class="round-btn" id="step-fwd-btn" title="Step forward">▶|</button>
          <span class="playback-status" id="playback-status">0 / 0 steps</span>
        </div>
      </section>

      <div class="row-splitter" id="row-splitter-right"></div>

      <section class="panel panel-probability">
        <div class="prob-toolbar">
          <div class="prob-toolbar-left">
            <h2 class="panel-title" id="prob-panel-title">Probabilities</h2>
            <span class="endian-label" id="prob-endian"></span>
          </div>
          <div class="prob-toolbar-right">
            <div class="prob-sampling" id="prob-sampling">
              <input class="shots-input" id="shots-input" type="number" min="1" max="100000" value="1024" title="Shots (1–100000)" aria-label="Shots">
              <button class="prob-run-btn" id="run-btn" title="Sample the distribution (measurement)">Run</button>
              <button class="prob-reset-btn hidden" id="reset-shots-btn" title="Clear sampling results">Reset</button>
            </div>
            <label class="prob-hide-toggle" id="prob-hide-toggle" title="Hide basis states with ~zero probability">
              <input type="checkbox" id="prob-hide-zeros" checked>
              <span>Hide 0%</span>
            </label>
          </div>
        </div>
        <div class="prob-split">
          <div class="prob-left">
            <div class="prob-chart" id="prob-list"></div>
            <div class="prob-footer" id="prob-footer"></div>
          </div>
          <div class="prob-right" id="dm-view">
            <div class="dm-header">Reduced density matrix</div>
            <div class="dm-qubit-tabs" id="dm-qubit-tabs"></div>
            <div class="dm-matrix" id="dm-matrix"></div>
            <div class="dm-metrics" id="dm-metrics"></div>
          </div>
        </div>
      </section>
      </div>
    </div>
  </div>

  <div class="place-popover hidden" id="place-popover"></div>

  <div class="export-menu hidden" id="export-menu">
    <button class="export-menu-item" id="export-qasm">Copy OpenQASM 2.0</button>
    <button class="export-menu-item" id="export-qiskit">Copy Qiskit (Python)</button>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
